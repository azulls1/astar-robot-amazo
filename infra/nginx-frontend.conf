server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Resolver de Docker (DNS interno) para que `backend` se resuelva en runtime.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Proxy a la API FastAPI (mismo dominio, sin CORS).
  # `backend` es el nombre del service en el stack Swarm.
  location /api/ {
    set $upstream_backend backend;
    proxy_pass http://$upstream_backend:8000$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  # Activos con hash → caché agresivo
  location ~* \.(js|css|woff2?|png|svg|jpg|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
