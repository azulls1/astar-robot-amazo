<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="A* Robot Amazon">
  <title>A* Robot Amazon</title>
  <defs>
    <linearGradient id="forest-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04202C"/>
      <stop offset="100%" stop-color="#5B7065"/>
    </linearGradient>
  </defs>

  <!-- Fondo cuadrado con gradiente forest -->
  <rect width="128" height="128" rx="24" fill="url(#forest-gradient)"/>

  <!-- Mini cuadrícula 4x4 sutil al fondo -->
  <g stroke="#9EADA3" stroke-opacity="0.15" stroke-width="0.5">
    <line x1="32" y1="20" x2="32" y2="108"/>
    <line x1="64" y1="20" x2="64" y2="108"/>
    <line x1="96" y1="20" x2="96" y2="108"/>
    <line x1="20" y1="32" x2="108" y2="32"/>
    <line x1="20" y1="64" x2="108" y2="64"/>
    <line x1="20" y1="96" x2="108" y2="96"/>
  </g>

  <!-- Símbolo "A*" centrado -->
  <text x="64" y="80" text-anchor="middle"
        font-family="'Sora','Helvetica Neue',Arial,sans-serif"
        font-size="62" font-weight="700"
        fill="#FFFFFF">
    A<tspan fill="#9EADA3" font-size="44" dy="-8">*</tspan>
  </text>
</svg>
